<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDFStudio</title>

<style>
body{font-family:Arial;background:#f4f8f6;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.tool{background:#fff;padding:18px;margin:10px 0;border-radius:15px;display:flex;justify-content:space-between}
button{padding:10px 18px;border:none;border-radius:20px;background:#1f2937;color:white}
button:hover{background:#1e6f5c}

#ad{background:#ddd;padding:20px;margin:10px 0;text-align:center;border-radius:15px}

#bar{
width:0%;
height:6px;
background:#1e6f5c;
transition:0.3s;
border-radius:10px;
}

#progress{
background:#ccc;
border-radius:10px;
margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>PDFStudio</h1>

<div id="progress"><div id="bar"></div></div>

<div class="tool">PDF to Word <button onclick="run('/pdf-to-word')">Use</button></div>
<div class="tool">Word to PDF <button onclick="run('/word-to-pdf')">Use</button></div>

<div id="ad">ADVERTISEMENT</div>

<div class="tool">PDF to Excel <button onclick="run('/pdf-to-excel')">Use</button></div>
<div class="tool">Excel to PDF <button onclick="run('/excel-to-pdf')">Use</button></div>

<div id="ad">ADVERTISEMENT</div>

<div class="tool">Merge PDF <button onclick="run('/merge',true)">Use</button></div>
<div class="tool">Split PDF <button onclick="run('/split')">Use</button></div>

<div id="ad">ADVERTISEMENT</div>

<div class="tool">JPG to PDF <button onclick="run('/jpg-to-pdf',true)">Use</button></div>
<div class="tool">PDF to JPG <button onclick="run('/pdf-to-jpg')">Use</button></div>

</div>

<script>

const API = "https://pdf-server-production-8399.up.railway.app";

function progressFake(){
let bar=document.getElementById("bar");
bar.style.width="20%";

setTimeout(()=>bar.style.width="60%",300);
setTimeout(()=>bar.style.width="90%",800);
}

function done(){
document.getElementById("bar").style.width="100%";
setTimeout(()=>document.getElementById("bar").style.width="0%",500);
}

function run(endpoint,multi=false){

let i=document.createElement("input");
i.type="file";
i.multiple=multi;

i.onchange=async()=>{
progressFake();

let f=new FormData();
for(let x of i.files){
f.append("files",x);
}

let r=await fetch(API+endpoint,{method:"POST",body:f});
let b=await r.blob();

done();

let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="file";
a.click();
}

i.click();
}

</script>

</body>
</html>
