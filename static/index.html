<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDFStudio</title>
<style>
body{font-family:Arial;background:#f4f8f6;text-align:center}
button{padding:12px 20px;margin:10px;border-radius:20px;border:none;background:#1f2937;color:white}
button:hover{background:#1e6f5c}
</style>
</head>
<body>

<h1>PDFStudio Tools</h1>

<button onclick="upload('/merge',true)">Merge PDF</button>
<button onclick="upload('/split')">Split PDF</button>
<button onclick="upload('/pdf-to-word')">PDF to Word</button>
<button onclick="upload('/word-to-pdf')">Word to PDF</button>
<button onclick="upload('/jpg-to-pdf',true)">JPG to PDF</button>
<button onclick="upload('/pdf-to-jpg')">PDF to JPG</button>
<button onclick="upload('/ocr')">OCR</button>
<button onclick="upload('/compress')">Compress</button>

<script>

const API = "https://YOUR-RAILWAY-LINK.up.railway.app";

function upload(endpoint,multi=false){
let i=document.createElement("input");
i.type="file";
i.multiple=multi;

i.onchange=async()=>{
let f=new FormData();

for(let x of i.files){
f.append("files",x);
}

let r=await fetch(API+endpoint,{method:"POST",body:f});
let b=await r.blob();

let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="file";
a.click();
}

i.click();
}

</script>

</body>
</html>
